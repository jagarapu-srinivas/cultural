<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Sanskriti Wellness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --saffron: #FF9933; --maroon: #800000; --bg-cream: #FDFCF0; }
        body { margin: 0; height: 100vh; font-family: 'Inter', sans-serif; background: var(--bg-cream); }
        .login-wrapper { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { width: 900px; background: #ffffff; border-radius: 30px; overflow: hidden; display: flex; box-shadow: 0 25px 70px rgba(0,0,0,0.1); }
        .login-left { width: 50%; padding: 60px; color: #ffffff; background: linear-gradient(160deg, var(--saffron) 0%, var(--maroon) 100%); display: flex; flex-direction: column; justify-content: center; }
        .login-left h1 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 20px; }
        .login-right { width: 50%; padding: 60px; background: white; }
        .form-control { border-radius: 12px; padding: 12px 20px; border: 1px solid #eee; background: #f9f9f9; }
        .btn-login { border-radius: 50px; background: var(--maroon); color: white; padding: 12px; font-weight: 600; border: none; transition: 0.3s; }
        .btn-login:hover { background: var(--saffron); transform: translateY(-2px); }
        a { color: var(--saffron); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card animate__animated animate__zoomIn">
        <div class="login-left">
            <h1>Namaste.</h1>
            <p class="lead">Sign in to continue your journey through ancient Indian wisdom and wellness.</p>
        </div>
        <div class="login-right">
            <h3 class="mb-4 fw-bold">Sign In</h3>
            {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3"><input type="text" name="username" class="form-control" placeholder="Username" required></div>
                <div class="mb-4"><input type="password" name="password" class="form-control" placeholder="Password" required></div>
                <button class="btn btn-login w-100">Sign In</button>
            </form>
            <p class="text-center mt-4">New here? <a href="{% url 'register' %}">Create an account</a></p>
        </div>
    </div>
</div>
</body>
</html>
